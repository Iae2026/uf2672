<style>

body{font-family:'Open Sans',sans-serif;background:#0d1f3c;color:#d0daea;padding:16px;}

.uf-msg{background:rgba(26,58,107,0.35);border:1px solid rgba(58,114,196,0.25);border-top:2px solid rgba(58,114,196,0.5);border-radius:10px;padding:14px;font-size:13px;line-height:1.6;}
.uf-panel{background:rgba(26,58,107,0.3);border:1px solid rgba(58,114,196,0.25);border-radius:10px;padding:14px;}

</style>

<script>
var WORKER_URL = 'https://old-base-435c.recursos-867.workers.dev';
var COURSE_ID = 4;

// Datos del curso cargados desde Moodle
var CURSO = {
  caps: [],      // [{seccion, nombre, url_todo, modulos:[{id,nombre,tipo,url}]}]
  cargado: false
};

var ANIMS = {
  saludo:    {w:'./WEBM/Saludo.webm',    d:4},
  senalar:   {w:'./WEBM/Senalar.webm',   d:5},
  hablando1: {w:'./WEBM/Hablando1.webm', d:6},
  hablando2: {w:'./WEBM/Hablando2.webm', d:6},
  idle:      {w:'./WEBM/Idle.webm',      d:5},
  walkie:    {w:'./WEBM/Walkie.webm',    d:5},
  brazos:    {w:'./WEBM/BrazosEnJarra.webm',d:5},
  perfecto:  {w:'./WEBM/Perfecto.webm',  d:4},
  stop:      {w:'./WEBM/Stop.webm',      d:3},
  pregunta:  {w:'./WEBM/Pregunta.webm',  d:4},
  impaciente:{w:'./WEBM/Impaciente.webm',d:4}
};
var GRUPOS = {
  idle:    ['idle','walkie','brazos','pregunta'],
  hablando:['hablando1','hablando2','senalar']
};
var CONSEJOS = [
  'La Constitucion Espanola fue aprobada el 6 de diciembre de 1978.',
  'El art. 17 CE garantiza el derecho a la libertad y seguridad.',
  'La Ley 5/2014 regula las funciones del vigilante de seguridad.',
  'El principio de proporcionalidad es clave en toda actuacion de seguridad.',
  'El detenido tiene derecho a ser informado de sus derechos inmediatamente.',
  'El derecho comunitario tiene primacia sobre el derecho nacional.',
  'La responsabilidad penal puede ser por accion u omision.',
  'El atestado policial recoge todas las actuaciones en el lugar de los hechos.'
];
var FRASES_SALUDO = [
  function(al,ag){return 'Hola '+al+'. Soy '+ag+', tu agente. Selecciona un capitulo para empezar.';},
  function(al,ag){return 'Bienvenido de nuevo, '+al+'. Soy '+ag+'. Por donde seguimos?';},
  function(al,ag){return al+', aqui '+ag+'. Elige el capitulo que toca.';},
  function(al,ag){return 'Agente '+ag+' en linea. '+al+', selecciona tu proximo objetivo.';}
];
var FRASES_ENTRAR = [
  function(al,t){return al+', entramos en '+t+'. Estudia el material y marca como completado.';},
  function(al,t){return 'Bienvenido a '+t+', '+al+'. Accede al contenido y trabaja a tu ritmo.';},
  function(al,t){return al+', '+t+' te espera. Pulsa Ver contenido para comenzar.';}
];
var FRASES_COMPLETAR = [
  function(al,t){return 'Enhorabuena, '+al+'. Has completado '+t+'. Pulsa Siguiente para continuar.';},
  function(al,t){return al+', '+t+' superado. Eso es dedicacion. Siguiente capitulo.';},
  function(al,t){return 'Bien hecho, '+al+'! '+t+' en el registro. Seguimos.';}
];
var FRASES_BLOQUEADO = [
  function(al){return al+', ese capitulo esta bloqueado. Completa el anterior primero.';},
  function(al){return 'Acceso denegado, '+al+'. Termina el capitulo anterior.';},
  function(al){return al+', paso a paso. Primero completa lo pendiente.';}
];
var FRASES_INACTIVO = [
  function(ag){return ag+' esperando. Sigues ahi? Pulsa un capitulo para continuar.';},
  function(ag){return 'Llevas un rato parado. '+ag+' esta listo cuando quieras.';},
  function(ag){return ag+' en espera. El curso no se termina solo. Vamos!';}
];

function r(arr){return arr[Math.floor(Math.random()*arr.length)];}
function gAl(){return localStorage.getItem('uf_al')||'Alumno';}
function gAg(){return localStorage.getItem('uf_ag')||'Agente';}
function gCo(){try{return JSON.parse(localStorage.getItem('uf_co')||'[]');}catch(e){return[];}}
function sCo(a){try{localStorage.setItem('uf_co',JSON.stringify(a));}catch(e){}}
function isC(id){return gCo().indexOf(id)!==-1;}
function mC(id){var a=gCo();if(a.indexOf(id)===-1){a.push(id);sCo(a);}}
function pctTotal(){var n=0,tot=CURSO.caps.length,co=gCo();CURSO.caps.forEach(function(c){if(co.indexOf('cap_'+c.seccion)!==-1)n++;});return tot>0?Math.round(n/tot*100):0;}

// Motor de video dual crossfade
var capaActiva={};var rotTimers={};var rotIndex={};

function setAnim(vidId,animKey,sinFade){
  var anim=ANIMS[animKey];if(!anim)return;
  var activa=capaActiva[vidId]||'a';var sig=activa==='a'?'b':'a';
  var vA=document.getElementById(vidId+'-'+activa);
  var vB=document.getElementById(vidId+'-'+sig);
  if(!vA||!vB)return;
  var FADE=sinFade?0:800;
  vB.src=anim.w;vB.loop=true;vB.muted=true;vB.load();
  var listo=false;
  function fazer(){
    if(listo)return;listo=true;
    vB.playbackRate=0.5;
    vB.play().catch(function(){});
    if(!sinFade){
      vB.style.transition='opacity '+(FADE/1000)+'s ease';
      vA.style.transition='opacity '+(FADE/1000)+'s ease';
    }
    vB.style.opacity='1';vA.style.opacity='0';
    capaActiva[vidId]=sig;
    // NO limpiar src de vA — mantenerla cargada como fallback
    setTimeout(function(){
      vA.pause();
    },FADE+300);
  }
  if(sinFade){fazer();}
  else{
    vB.oncanplay=function(){vB.oncanplay=null;fazer();};
    setTimeout(function(){if(!listo)fazer();},1500);
  }
}

function iniciarRotacion(vidId,grupo,primerAnim,base){
  if(rotTimers[vidId])clearTimeout(rotTimers[vidId]);
  rotIndex[vidId]=0;capaActiva[vidId]='a';
  var lista=GRUPOS[grupo]||GRUPOS.idle;
  var vA=document.getElementById(vidId+'-a');
  if(vA){vA.src=ANIMS[primerAnim||lista[0]].w;vA.style.opacity='1';vA.playbackRate=0.5;vA.load();vA.play().catch(function(){});}
  var vB=document.getElementById(vidId+'-b');if(vB){vB.style.opacity='0';vB.src='';}
  var ms=base||18000;
  function sig(){
    rotIndex[vidId]=(rotIndex[vidId]+1)%lista.length;
    setAnim(vidId,lista[rotIndex[vidId]]);
    rotTimers[vidId]=setTimeout(sig,ms+Math.random()*7000);
  }
  rotTimers[vidId]=setTimeout(sig,ms+Math.random()*6000);
}

function pararRotacion(vidId){if(rotTimers[vidId]){clearTimeout(rotTimers[vidId]);rotTimers[vidId]=null;}}

function animPuntual(vidId,animKey,grupo,dur){
  pararRotacion(vidId);
  var anim=ANIMS[animKey];if(!anim)return;
  var activa=capaActiva[vidId]||'a';var sig=activa==='a'?'b':'a';
  var vA=document.getElementById(vidId+'-'+activa);
  var vB=document.getElementById(vidId+'-'+sig);
  if(!vB)return;
  vB.src=anim.w;vB.loop=false;vB.muted=true;vB.load();
  var listo=false;
  function mostrar(){
    if(listo)return;listo=true;
    vB.playbackRate=0.5;vB.play().catch(function(){});
    vB.style.transition='opacity 0.7s ease';
    if(vA){vA.style.transition='opacity 0.7s ease';vA.style.opacity='0';}
    vB.style.opacity='1';capaActiva[vidId]=sig;
    vB.onended=function(){
      vB.onended=null;vB.loop=true;
      iniciarRotacion(vidId,grupo,null,18000);
    };
    setTimeout(function(){

function speak(t,vozId,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  // Comprobar si otro iframe está hablando
  var lastSpeak=parseInt(localStorage.getItem('uf_last_speak')||'0');
  if(Date.now()-lastSpeak<500){
    // Otro iframe acaba de hablar, esperar
    setTimeout(function(){speak(t,vozId,cb);},1000);
    return;
  }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);u.lang='es-ES';u.rate=0.92;
  var vs=window.speechSynthesis.getVoices();
  var v=vs.find(function(x){return x.lang==='es-ES'&&x.name.toLowerCase().indexOf('google')!==-1;})||vs.find(function(x){return x.lang.indexOf('es')===0;});
  if(v)u.voice=v;
  var vb=document.getElementById(vozId);
  u.onstart=function(){
    if(vb)vb.style.display='flex';
    localStorage.setItem('uf_last_speak',Date.now().toString());
  };
  u.onend=u.onerror=function(){if(vb)vb.style.display='none';if(cb)cb();};
  window.speechSynthesis.speak(u);
}

// Cargar datos del Worker
function cargarCurso(cb){
  fetch(WORKER_URL+'?action=contents')
    .then(function(r){return r.json();})
    .then(function(sections){
      if(!Array.isArray(sections)){if(cb)cb();return;}
      CURSO.caps=[];
      sections.forEach(function(sec){
        if(sec.section===0)return; // seccion general
        if(!sec.visible)return;
        // Solo excluir subsecciones que pertenecen a un modulo padre
        if(sec.component==='mod_subsection')return;

        var modulos=[];
        if(sec.modules){
          sec.modules.forEach(function(mod){
            if(!mod.uservisible)return;
            modulos.push({
              id:mod.id,
              nombre:mod.name,
              tipo:mod.modname,
              url:mod.url||'#',
              seccionId:mod.customdata&&mod.customdata!=='\"\""'?JSON.parse(mod.customdata).sectionid:null
            });
          });
        }

        CURSO.caps.push({
          seccion:sec.section,
          nombre:sec.name,
          url_todo:'https://campus.iaeformacion.com/course/view.php?id='+COURSE_ID+'&section='+sec.section,
          modulos:modulos
        });
      });

      // Ordenar por numero de seccion
      CURSO.caps.sort(function(a,b){return a.seccion-b.seccion;});
      CURSO.cargado=true;
      if(cb)cb();
    })
    .catch(function(){CURSO.cargado=true;if(cb)cb();});
}

function renderCaps(){

  CURSO.caps.forEach(function(cap,i){

// Estado del capitulo actual
var capActual=null;

function irCap(cap){
  capActual=cap;

  // Comprobar si el capitulo esta bloqueado
  var co=gCo();
  var idxCap=CURSO.caps.findIndex(function(c){return c.seccion===cap.seccion;});
  var bloqueado=idxCap>0&&co.indexOf('cap_'+CURSO.caps[idxCap-1].seccion)===-1;

  if(bloqueado){
    // Mostrar pantalla de bloqueado en lugar del capitulo
    ir('p-inicio');
    var msg=document.getElementById('msg-inicio');
    if(msg)msg.innerHTML='<strong style="color:#cf6679;">Este capitulo esta bloqueado.</strong><br>Completa el capitulo anterior primero.';
    iniciarRotacion('vid-inicio','idle','stop',20000);
    renderCaps();
    return;
  }

  ir('p-cap');

  var co=gCo();
  var al=gAl(),ag=gAg();
  var completado=co.indexOf('cap_'+cap.seccion)!==-1;

  // Actualizar UI
  var label=document.getElementById('cap-num-label');if(label)label.textContent='Capitulo '+cap.seccion;
  var nombre=document.getElementById('cap-nombre-label');if(nombre)nombre.textContent=cap.nombre;
  var chip=document.getElementById('chip-cap');if(chip)chip.textContent=ag.toUpperCase();
  var progLabel=document.getElementById('cap-prog-label');if(progLabel)progLabel.textContent=cap.nombre;

  var pm=document.getElementById('panel-modulo');if(pm)pm.style.display='none';

  // Detectar subsecciones (modulos tipo subsection)
  var subsecciones=cap.modulos.filter(function(m){return m.tipo==='subsection';});
  var tieneSubsecciones=subsecciones.length>0;

  renderModulos(cap,tieneSubsecciones);

  var msg=document.getElementById('msg-cap');
  var animales=['hablando1','hablando2','senalar'];
  var primerAnim=animales[cap.seccion%animales.length];

  // Boton escuchar bienvenida
  var prevBtn=document.getElementById('btn-escuchar-bienvenida');

  var btnEsc=document.createElement('button');
  btnEsc.id='btn-escuchar-bienvenida';

  btnEsc.textContent='Escuchar presentacion del capitulo';
  btnEsc.onclick=function(){
    var bienvenidas=BIENVENIDAS[cap.seccion]||BIENVENIDAS[1];
    var frase=r(bienvenidas);
    animPuntual('vid-cap','senalar','hablando',5);

      setTimeout(function(){mostrarPregunta(cap.seccion);},3000);
    });

    setTimeout(function(){btnEsc.style.opacity='1';btnEsc.textContent='Escuchar presentacion del capitulo';},8000);
  };
  var msgCap=document.getElementById('msg-cap');
  if(msgCap&&msgCap.parentNode)msgCap.parentNode.insertBefore(btnEsc,msgCap);

  if(completado){
    if(msg)msg.innerHTML='Has completado este capitulo. Pulsa Siguiente para continuar.';
    animPuntual('vid-cap','perfecto','hablando',4);
    var sig=document.getElementById('btn-sig-cap');if(sig)sig.style.display='block';
  }else{
    if(msg)msg.innerHTML='Hola <strong style="color:#e8c96a;">'+al+'</strong>. Soy <strong style="color:#c9a84c;">'+ag+'</strong>.<br>Estudia el contenido y marca como completado cuando termines.';
    iniciarRotacion('vid-cap','hablando',primerAnim,11000);
    var sig=document.getElementById('btn-sig-cap');if(sig)sig.style.display='none';
  }

  // Boton completar
  var bcomp=document.getElementById('btn-comp-cap-dyn');
  if(bcomp)bcomp.remove();

  var sigBtn=document.getElementById('btn-sig-cap');
  if(sigBtn){
    sigBtn.onclick=null;
    sigBtn.onclick=function(){
      window.speechSynthesis&&window.speechSynthesis.cancel();
      var co=gCo();
      var sigCap=CURSO.caps.find(function(c){
        return co.indexOf('cap_'+c.seccion)===-1 && c.seccion!==cap.seccion;
      });
      if(sigCap){
        if(getParamCap()){
          // Estamos en iframe de capitulo — navegar a Moodle
          animPuntual('vid-cap','walkie','hablando',2);
          setTimeout(function(){
            window.top.location.href=sigCap.url_todo;

          // Estamos en iframe general — abrir directamente
          animPuntual('vid-cap','walkie','hablando',2);
          setTimeout(function(){irCap(sigCap);},800);
        }
      }else{
        if(getParamCap()){
          window.top.location.href='https://campus.iaeformacion.com/course/view.php?id='+COURSE_ID;
        }else{
          mostrarInicio();

    cap.modulos.filter(function(m){return m.tipo==='subsection';}).forEach(function(mod){
      var d=document.createElement('div');
      d.className='uf-item';
      d.style.background='rgba(26,58,107,0.4)';
      d.style.border='1px solid rgba(58,114,196,0.35)';
      d.style.color='#d0daea';
      d.innerHTML='<span>'+mod.nombre+'</span><span></span>';
      d.addEventListener('click',function(){abrirSubseccion(mod,cap);});
      lt.appendChild(d);
    });
  }else{
    // Mostrar contenido directo del capitulo
    var scorms=cap.modulos.filter(function(m){return m.tipo==='scorm';});
    var acts=cap.modulos.filter(function(m){return m.tipo==='quiz'||m.tipo==='assign'||m.tipo==='forum';});

    // Panel con botones
    var pm=document.getElementById('panel-modulo');if(pm)pm.style.display='block';
    var mt=document.getElementById('modulo-titulo');if(mt)mt.textContent=cap.nombre;
    var md=document.getElementById('modulo-desc');if(md)md.textContent='Accede al contenido y a las actividades de este capitulo.';

    var btns=document.getElementById('modulo-btns');if(btns)btns.innerHTML='';

    if(scorms.length>0){
      var bCont=document.createElement('button');
      bCont.className='uf-btn-azul';bCont.textContent='Ver contenido';
      bCont.onclick=function(){window.top.location.href=scorms[0].url;};
      if(btns)btns.appendChild(bCont);
    }

    if(acts.length>0){
      var bActs=document.createElement('button');
      bActs.className='uf-btn-azul';bActs.textContent='Ver actividades';
      bActs.style.background='rgba(26,58,107,0.7)';bActs.style.borderColor='rgba(58,114,196,0.8)';
      bActs.onclick=function(){mostrarActividades(acts,'panel-modulo');};
      if(btns)btns.appendChild(bActs);
    }

    var bComp=document.createElement('button');
    bComp.className='uf-btn-verde';bComp.id='btn-comp-cap-dyn';
    var capId='cap_'+cap.seccion;
    if(isC(capId)){bComp.textContent='Completado';bComp.style.opacity='0.5';bComp.style.cursor='default';}
    else{bComp.textContent='Marcar como completado';}
    bComp.onclick=function(){
      if(isC(capId))return;
      mC(capId);
      bComp.textContent='Completado';bComp.style.opacity='0.5';bComp.style.cursor='default';
      var msg=document.getElementById('msg-cap');
      if(msg)msg.innerHTML='Has completado este capitulo. Pulsa Siguiente para continuar.';
      animPuntual('vid-cap','perfecto','hablando',4);lanzarConfeti();
      var sig=document.getElementById('btn-sig-cap');
      if(sig){
        sig.style.display='block';
        var co2=gCo();
        var sigCap2=CURSO.caps.find(function(c){return co2.indexOf('cap_'+c.seccion)===-1&&c.seccion!==cap.seccion;});
        sig.textContent=sigCap2?'Siguiente: '+sigCap2.nombre:'Volver al inicio';
        sig.onclick=function(){
          window.speechSynthesis&&window.speechSynthesis.cancel();
          if(sigCap2){
            animPuntual('vid-cap','walkie','hablando',2);
            setTimeout(function(){
              if(getParamCap()){
                window.top.location.href=sigCap2.url_todo;
              }else{
                irCap(sigCap2);
              }
            },800);
          }else{
            if(getParamCap()){
              window.top.location.href='https://campus.iaeformacion.com/course/view.php?id='+COURSE_ID;
            }else{
              mostrarInicio();
            }
          }
        };
      }
      var pf=document.getElementById('pf-cap');if(pf)pf.style.width='100%';
      var pp=document.getElementById('pp-cap');if(pp)pp.textContent='Completado';
      setTimeout(function(){speak(r(FRASES_COMPLETAR)(gAl(),cap.nombre),'voz-cap');},300);
      setTimeout(function(){
        var pf2=document.getElementById('pf-inicio'),pp2=document.getElementById('pp-inicio');
        var pct=pctTotal();if(pf2)pf2.style.width=pct+'%';if(pp2)pp2.textContent=pct;
      },500);
    };
    if(btns)btns.appendChild(bComp);

    // Ver todo — solo uno, insertado después de los botones
    var bTodo=document.createElement('a');
    bTodo.className='uf-btn-siguiente';bTodo.style.display='block';bTodo.style.marginTop='8px';
    bTodo.textContent='Ver todo el capitulo';bTodo.href=cap.url_todo;bTodo.target='_top';
    if(btns&&btns.parentNode)btns.parentNode.insertBefore(bTodo,btns.nextSibling);
  }
}

function abrirSubseccion(mod,cap){
  // Buscar la seccion de esta subseccion en los datos del Worker
  var sectionId=mod.seccionId;
  var pm=document.getElementById('panel-modulo');if(pm)pm.style.display='block';
  var mt=document.getElementById('modulo-titulo');if(mt)mt.textContent=mod.nombre;
  var md=document.getElementById('modulo-desc');if(md)md.textContent='Accede al contenido de este tema.';
  var btns=document.getElementById('modulo-btns');if(btns)btns.innerHTML='';
  var ma=document.getElementById('modulo-acts');if(ma)ma.innerHTML='';

  // Buscar la subseccion completa desde el Worker para tener sus modulos
  fetch(WORKER_URL+'?action=contents')
    .then(function(r2){return r2.json();})
    .then(function(sections){
      var subsec=sections.find(function(s){return s.id==sectionId;});
      var modsSubsec=subsec&&subsec.modules?subsec.modules:[];
      var scorms=modsSubsec.filter(function(m){return m.modname==='scorm';});
      var acts=modsSubsec.filter(function(m){return m.modname==='quiz'||m.modname==='assign'||m.modname==='forum';});
      var secUrl='https://campus.iaeformacion.com/course/view.php?id='+COURSE_ID+'&section='+subsec.section;

      if(scorms.length>0&&btns){
        var bCont=document.createElement('button');bCont.className='uf-btn-azul';bCont.textContent='Ver contenido';
        bCont.onclick=function(){window.top.location.href=scorms[0].url;};btns.appendChild(bCont);
      }
      if(acts.length>0&&btns){
        var actsData=acts.map(function(m){return{nombre:m.name,tipo:m.modname,url:m.url};});
        var bActs=document.createElement('button');bActs.className='uf-btn-azul';bActs.textContent='Ver actividades';
        bActs.style.background='rgba(26,58,107,0.7)';bActs.style.borderColor='rgba(58,114,196,0.6)';
        bActs.onclick=function(){mostrarActividadesRaw(actsData,'panel-modulo');};btns.appendChild(bActs);
      }

      // Boton completado para subseccion
      var subId='sub_'+sectionId;
      var bComp=document.createElement('button');
      bComp.className='uf-btn-verde';
      if(isC(subId)){bComp.textContent='Completado';bComp.style.opacity='0.5';bComp.style.cursor='default';}
      else{bComp.textContent='Marcar como completado';}
      bComp.onclick=function(){
        if(isC(subId))return;
        mC(subId);
        bComp.textContent='Completado';bComp.style.opacity='0.5';bComp.style.cursor='default';
        animPuntual('vid-cap','perfecto','hablando',4);lanzarConfeti();
        setTimeout(function(){speak('Muy bien. Has completado '+mod.nombre+'.','voz-cap');},300);
      };
      if(btns)btns.appendChild(bComp);

      // Boton ver todo (solo uno)
      var bTodo=document.createElement('a');bTodo.className='uf-btn-siguiente';
      bTodo.style.display='block';bTodo.style.marginBottom='8px';bTodo.style.marginTop='8px';
      bTodo.textContent='Ver todo el tema';bTodo.href=secUrl;bTodo.target='_top';
      if(btns)btns.after(bTodo);

      animPuntual('vid-cap','senalar','hablando',5);
      setTimeout(function(){speak(r(FRASES_ENTRAR)(gAl(),mod.nombre),'voz-cap');},400);
      if(pm)pm.scrollIntoView({behavior:'smooth',block:'nearest'});
    })
    .catch(function(){});
}

function mostrarActividadesRaw(acts,panelId){
  var panel=document.getElementById(panelId);if(!panel)return;
  var prev=panel.querySelector('.uf-acts-lista');if(prev)prev.remove();
  var lista=document.createElement('div');lista.className='uf-acts-lista';
  var nombres={quiz:'Evaluacion',assign:'Tarea',forum:'Foro de reflexion'};
  acts.forEach(function(act){
    var a=document.createElement('a');a.href=act.url;a.target='_top';
    a.innerHTML='<span>'+(nombres[act.tipo]||act.nombre)+'</span><span style="margin-left:auto;color:#c9a84c;font-size:10px;">entrar</span>';
    var consejo=CONSEJOS[Math.floor(Math.random()*CONSEJOS.length)];
    a.addEventListener('click',function(e){
      e.preventDefault();var url=this.href;
      animPuntual('vid-cap','senalar','hablando',3);
      speak('Antes de empezar, recuerda: '+consejo,'voz-cap',function(){window.top.location.href=url;});
    });
    lista.appendChild(a);
  });
  panel.appendChild(lista);lista.scrollIntoView({behavior:'smooth',block:'nearest'});
  animPuntual('vid-cap','walkie','hablando',4);
  speak('Aqui tienes las actividades. Pulsa en la que quieras hacer.','voz-cap');
}

function getParamCap(){
  try{var p=new URLSearchParams(window.location.search);return p.get('cap')?parseInt(p.get('cap')):null;}
  catch(e){return null;}
}

window.addEventListener('DOMContentLoaded',function(){
  var btnCom=document.getElementById('btn-comenzar');
  if(btnCom)btnCom.addEventListener('click',function(){
    var ale=document.getElementById('inp-al'),age=document.getElementById('inp-ag');
    var a=ale?ale.value.trim():'',b=age?age.value.trim():'';
    if(!a){if(ale)ale.style.borderColor='#cc4444';return;}
    if(!b){if(age)age.style.borderColor='#cc4444';return;}
    localStorage.setItem('uf_al',a);localStorage.setItem('uf_ag',b);
    setChips();
    var esPrimera=!localStorage.getItem('uf_bienvenida');
    if(esPrimera){
      localStorage.setItem('uf_bienvenida','1');
      speak(r(FRASES_SALUDO)(a,b),'voz-inicio');
    }
    var paramCap=getParamCap();
    cargarCurso(function(){
      if(paramCap){
        var cap=CURSO.caps.find(function(c){return c.seccion===paramCap;});
        if(cap){irCap(cap);}else{mostrarInicio();}
      }else{
        mostrarInicio();
      }
    });
  });

  var btnCambiar=document.getElementById('btn-cambiar');
  if(btnCambiar){
    if(getParamCap()){
      btnCambiar.style.display='none';
    }else{
      btnCambiar.addEventListener('click',function(){
        window.speechSynthesis&&window.speechSynthesis.cancel();
        localStorage.removeItem('uf_al');
        localStorage.removeItem('uf_ag');
        localStorage.removeItem('uf_bienvenida');
        pantActual='p-inicio';
        ir('p-nombre');
      });
    }
  }

  var btnVolver=document.getElementById('btn-volver-cap');
  if(btnVolver)btnVolver.addEventListener('click',function(){
    window.speechSynthesis&&window.speechSynthesis.cancel();
    if(getParamCap()){
      window.top.location.href='https://campus.iaeformacion.com/course/view.php?id='+COURSE_ID;
    }else{
      mostrarInicio();
    }
  });

  var inpAl=document.getElementById('inp-al'),inpAg=document.getElementById('inp-ag');
  if(inpAl)inpAl.addEventListener('keydown',function(e){if(e.key==='Enter'&&inpAg)inpAg.focus();});
  if(inpAg)inpAg.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btn-comenzar').click();});

  setChips();

  var paramCap=getParamCap();
  if(localStorage.getItem('uf_al')&&localStorage.getItem('uf_ag')){
    cargarCurso(function(){
      if(paramCap){
        var cap=CURSO.caps.find(function(c){return c.seccion===paramCap;});
        if(cap){irCap(cap);}else{mostrarInicio();}
      }else{
        mostrarInicio();
      }
    });
  } else if(paramCap){
    // Está en un iframe de capítulo pero no tiene nombre — mostrar mensaje
    ir('p-inicio');
    var msg=document.getElementById('msg-inicio');
    if(msg)msg.innerHTML='<strong style="color:#c9a84c;">Para acceder a este capitulo primero debes registrarte.</strong><br>Ve a la seccion principal del curso e introduce tu nombre y el nombre de tu agente.';
    var lt=document.getElementById('lista-caps');if(lt)lt.innerHTML='';
    var bc=document.getElementById('btn-cambiar');if(bc)bc.style.display='none';
    iniciarRotacion('vid-inicio','idle','pregunta',20000);
  } else {
    // Iframe general sin nombre — mostrar pantalla de nombre
  }

  document.addEventListener('click',resetInactivo);
  document.addEventListener('keydown',resetInactivo);
  resetInactivo();

  // Sincronizar progreso entre iframes cuando cambia localStorage
  window.addEventListener('storage',function(e){
    if(e.key==='uf_co'){
      if(pantActual==='p-inicio'){
        var pf=document.getElementById('pf-inicio'),pp=document.getElementById('pp-inicio');
        var pct=pctTotal();if(pf)pf.style.width=pct+'%';if(pp)pp.textContent=pct;
        // Si el curso ya está cargado actualizar directamente, si no cargarlo primero
        if(CURSO.cargado){
          renderCaps();
        }else{
          cargarCurso(function(){renderCaps();});
        }
      }
      if(pantActual==='p-cap'&&capActual){
        var capId='cap_'+capActual.seccion;
        if(isC(capId)){
          var bcomp=document.getElementById('btn-comp-cap-dyn');
          if(bcomp){bcomp.textContent='Completado';bcomp.style.opacity='0.5';bcomp.style.cursor='default';}
          var sig=document.getElementById('btn-sig-cap');if(sig)sig.style.display='block';
        }
      }
    }
    if(e.key==='uf_last_activity'){
      // Otro iframe tuvo actividad — resetear timer de inactividad sin hablar
      if(inactivoTimer)clearTimeout(inactivoTimer);
      inactivoTimer=setTimeout(function(){
        var lastSpeak=parseInt(localStorage.getItem('uf_last_speak')||'0');
        if(Date.now()-lastSpeak<10000)return;
        var ag=gAg();var frase=r(FRASES_INACTIVO)(ag);
        var av=document.getElementById('uf-inactivo');
        if(av){av.textContent=frase;av.style.display='block';}
        var vidId=pantActual==='p-inicio'?'vid-inicio':'vid-cap';
        var vozId=pantActual==='p-inicio'?'voz-inicio':'voz-cap';
        animPuntual(vidId,'impaciente','idle',4);
        speak(frase,vozId);
        localStorage.setItem('uf_last_speak',Date.now().toString());
        setTimeout(function(){if(av)av.style.display='none';},5000);
      },120000);
    }
  });

  function sendHeight(){var h=document.body.scrollHeight;window.parent.postMessage({ufHeight:h},'*');}
  sendHeight();
  new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true,attributes:true});
  window.addEventListener('resize',sendHeight);
});
</script>
